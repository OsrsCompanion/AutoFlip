<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Register - Auto Flip Web</title><link rel="icon" type="image/png" href="assets/favicon.png" />
<style>
:root{--text:#fff2dd;--muted:#d6c09e;--line:rgba(230,184,92,.22)}*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;color:var(--text);background:linear-gradient(180deg,rgba(16,8,4,.55),rgba(16,8,4,.72)),#120905 url('assets/background.jpg') center/cover fixed no-repeat;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px}.shell{width:min(100%,460px);background:rgba(28,16,9,.92);border:1px solid var(--line);border-radius:24px;padding:26px;box-shadow:0 24px 60px rgba(0,0,0,.38)}h1{margin:0 0 8px}p{color:var(--muted);line-height:1.6}label{display:block;margin:14px 0 6px;color:#efd5a3;font-weight:700}input{width:100%;padding:12px 13px;border-radius:12px;border:1px solid rgba(230,184,92,.18);background:rgba(18,10,6,.92);color:var(--text)}.row{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 15px;border-radius:12px;border:1px solid rgba(233,190,103,.22);background:linear-gradient(180deg,rgba(66,42,23,.96),rgba(38,24,15,.96));color:var(--text);text-decoration:none;font-weight:700;cursor:pointer}.btn.gold{background:linear-gradient(135deg,#e4b55f,#c6862a);color:#24170d;border:0}.status{margin-top:14px;padding:12px 13px;border-radius:14px;background:rgba(62,37,17,.66);border:1px solid rgba(240,190,98,.22);color:#f5e9cd;white-space:pre-wrap}.status.error{background:rgba(67,28,20,.66);border-color:rgba(196,94,55,.34);color:#ffd4c3}.status.success{background:rgba(25,44,24,.56);border-color:rgba(94,143,97,.34);color:#d6f3da}.top{position:absolute;left:24px;top:18px}.link{color:#f0be62;text-decoration:none}</style></head>
<body><a class="top link" href="/">← Back</a><div class="shell"><h1>Create account</h1><p>Start free on Auto Flip Web now and keep the same account when you unlock the plugin later.</p><label for="email">Email</label><input id="email" type="email" placeholder="you@example.com" /><label for="password">Password</label><input id="password" type="password" placeholder="Password" /><div class="row"><button id="submitBtn" class="btn gold" type="button">Create Account</button><a class="btn" href="/login.html?next=/app/">Already have an account?</a></div><div id="status" class="status">Use the same account here and inside the plugin later.</div></div>
<script>
function nextUrl(){const p=new URLSearchParams(location.search).get('next'); return p || '/app/';}
async function api(url, options={}){const response=await fetch(url,{headers:{'Content-Type':'application/json',...(options.headers||{})},...options}); const data=await response.json().catch(()=>({})); if(!response.ok) throw new Error(data.detail || 'Request failed'); return data;}
function setStatus(text,tone=''){const el=document.getElementById('status'); el.textContent=text; el.className='status'+(tone?(' '+tone):'');}
document.getElementById('submitBtn').addEventListener('click', async ()=>{const email=document.getElementById('email').value.trim(); const password=document.getElementById('password').value; try { const payload=await api('/auth/signup', {method:'POST', body: JSON.stringify({email,password})}); if(payload.token) localStorage.setItem('osrs_token', payload.token); setStatus('Account created. Redirecting...','success'); setTimeout(()=>location.href=nextUrl(), 300); } catch(error) { setStatus(error.message,'error'); } });
</script></body></html>
